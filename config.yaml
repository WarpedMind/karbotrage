system:
  debug: true
  log_level: INFO
  log_file: karbotrage.log

trading:
  mode: paper
  max_positions: 10
  position_size: 1000
  risk_tolerance: 0.02

api:
  polymarket:
    enabled: false
    api_key: ""
    base_url: "https://api.polymarket.com"
  kalshi:
    enabled: false
    api_key: ""
    base_url: "https://api.kalshi.com"

strategy:
  enabled: true
  name: "basic_strategy"
  parameters:
    threshold: 0.1
    max_loss: 0.05
    max_gain: 0.2

monitoring:
  enabled: true
  metrics:
    - "market_data"
    - "trades"
    - "portfolio"